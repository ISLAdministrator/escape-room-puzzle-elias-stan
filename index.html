<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.cdnfonts.com/css/pixelify-sans" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Science Lab Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Escape Room</h1>

    <div id="sciencelab-intro-screen">
        <p><mark class="highlight">The reactor is unstable. You must find the 4 manual override levers to prevent a meltdown.</mark></p>
        <button id="sciencelab-continue-btn">Continue</button>
    </div>

    <div id="sciencelab-puzzle-screen" style="display: none;">
        <h2>System Alert</h2>
        <p>Locate all 4 levers hidden in the room.</p>
        <button id="js-start-btn">Start</button>
    </div>

    <div id="sciencelab-game-canvas" style="display: none;">
        <div id="sciencelab-counter">Levers Found: <span id="sciencelab-count-num">0</span>/4</div>

        <div id="lever1" class="hotspot"></div>
        <div id="lever2" class="hotspot"></div>
        <div id="lever3" class="hotspot"></div>
        <div id="lever4" class="hotspot"></div>

        <div id="reactor-status" style="display: none;">
            <h1>REACTOR STABILISED</h1>
        </div>
    </div>
   <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<h1>Escape Room</h1>

    <script src="script.js"></script>
</body> 
</html>
